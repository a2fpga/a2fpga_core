set(CONFIG_FREERTOS 1)
set(CONFIG_CHERRYUSB 1)
set(CONFIG_CHERRYUSB_HOST 1)
# v2.3.27 requires explicitly selecting the CherryUSB OSAL backend.
set(CONFIG_CHERRYUSB_OSAL "freertos")
# Networking: lwIP + the stock CherryUSB CDC-ECM host driver for the
# USB-Ethernet card<->PC path. The RTL8153 is enumerated into its config-2
# CDC-ECM by our usbh_get_hport_active_config_index() override in main.c.
set(CONFIG_LWIP 1)
set(CONFIG_CHERRYUSB_HOST_CDC_ECM 1)
# RTL8152 (0x0bda/0x8152) USB-Ethernet via the STOCK CherryUSB vendor driver —
# the supported path (rtl_ops.enable() does the vendor RX-engine init the generic
# CDC-ECM path never did). Coexists with CDC-ECM: each device's class matches its
# own driver (8152 -> vendor config, 8153 -> CDC-ECM config 2 via the hook).
set(CONFIG_CHERRYUSB_HOST_RTL8152 1)
