[cfg]
# 0: no erase, 1:programmed section erase, 2: chip erase
erase = 1
# skip mode set first para is skip addr, second para is skip len, multi-segment region with ; separated
skip_mode = 0x0, 0x0
# 0: not use isp mode, #1: isp mode
boot2_isp_mode = 0

# DANGER: do NOT flash this firmware at 0x0 on a fused board — it erases the
# signed Sipeed Stage 1 and bricks the board. Our firmware is Stage 2 at
# 0x40000. The ONLY supported flasher is tools/a2n20-mcu-program (/flash-mcu
# skill); `make flash` is disabled in the Makefile. Address kept at 0x40000 here
# so even a direct BLFlashCommand --config can't brick a fused board.
[FW]
filedir = ./build/build_out/a2n20_bl616_$(CHIPNAME).bin
address = 0x40000
